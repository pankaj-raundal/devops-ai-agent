# ============================================================
# DevOps AI Agent — Configuration
# ============================================================
# Copy this to config.local.yaml and fill in your values.
# config.local.yaml is gitignored and will override these defaults.

# --- Project Defaults ---
project:
  name: "my-drupal-project"
  workspace_dir: ""            # Path to your local Drupal workspace
  module_path: ""              # Relative path to the module under development
  base_branch: "master"        # Branch to create feature branches from
  branch_prefix: "feature"     # Prefix for feature branches

# --- Azure DevOps ---
azure_devops:
  organization: ""             # e.g. https://dev.azure.com/my-org
  project: ""                  # e.g. "My Project"
  team: ""                     # e.g. "My Team"
  assigned_to: ""              # e.g. "John Doe"
  auto_tag: "auto"             # Tag that marks stories for automation
  states:
    - "New"
    - "Active"
  current_sprint_only: true

# --- Zendesk ---
zendesk:
  enabled: false
  subdomain: ""                # e.g. "mycompany" for mycompany.zendesk.com
  email: ""
  # API token stored in environment: ZENDESK_API_TOKEN
  assignee_name: ""            # Name to match for ticket assignment
  auto_create_story: true      # Auto-create DevOps story from Zendesk ticket
  poll_interval_seconds: 300   # 5 minutes

# --- Webhook Server (for push-based triggers) ---
webhook:
  enabled: false
  host: "0.0.0.0"
  port: 8089
  secret: ""                   # Shared secret for webhook validation
                               # Store in environment: WEBHOOK_SECRET

# --- AI Agent ---
ai_agent:
  provider: "anthropic"        # "anthropic", "openai", or "custom"
  model: "claude-sonnet-4-20250514"  # Model to use for implementation
  review_model: "claude-sonnet-4-20250514"  # Model to use for code review
  # API keys stored in environment: ANTHROPIC_API_KEY or OPENAI_API_KEY
  max_tokens: 8192
  temperature: 0.2
  context_files:               # Files to include as context for the AI agent
    - ".current-story.md"
  system_prompt_template: "templates/implement.md"
  review_prompt_template: "templates/review.md"

# --- Local Environment ---
local_env:
  type: "ddev"                 # "ddev", "lando", "docker-compose", "native"
  start_command: "ddev start"
  stop_command: "ddev stop"
  drush_prefix: "ddev drush"
  composer_prefix: "ddev composer"
  test_command: "ddev exec phpunit -c web/core"
  lint_command: "ddev exec phpcs --standard=Drupal --extensions=php,module,install,theme"
  cache_clear: "ddev drush cr"

# --- Git ---
git:
  auto_commit: true
  auto_push: false             # Push to remote after commit
  commit_message_template: "#{work_item_id} - {title}\n\n{description}"

# --- Notifications ---
notifications:
  enabled: false
  slack_webhook: ""            # Slack incoming webhook URL
  email: ""                    # Email for notifications

# --- Logging ---
logging:
  level: "INFO"                # DEBUG, INFO, WARNING, ERROR
  file: "logs/agent.log"
  max_size_mb: 10
