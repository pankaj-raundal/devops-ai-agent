# ============================================================
# DevOps AI Agent — Configuration
# ============================================================
# Copy this to config.local.yaml and fill in your values.
# config.local.yaml is gitignored and will override these defaults.

# --- Project Defaults ---
project:
  name: "my-project"
  workspace_dir: ""            # Path to your local project workspace
  module_path: ""              # Relative path to the package/module under development
  framework: "drupal"          # Framework profile: drupal, python, react, java, dotnet, angular
  base_branch: "master"        # Branch to create feature branches from
  branch_prefix: "feature"     # Prefix for feature branches

# --- Azure DevOps ---
azure_devops:
  organization: ""             # e.g. https://dev.azure.com/my-org
  project: ""                  # e.g. "My Project"
  team: ""                     # e.g. "My Team"
  assigned_to: ""              # e.g. "John Doe"
  auto_tag: "auto"             # Tag that marks stories for automation
  states:                        # States to FETCH for processing (must have 'auto' tag too)
    - "New"
    - "Active"
  current_sprint_only: true
  # State transitions after pipeline processing:
  state_on_success: "Testing"    # After successful pipeline (code change path)
  state_on_no_code: "Evaluation" # After analysis finds no code change needed
  state_on_failure: ""           # Leave empty to keep current state on failure

# --- Zendesk ---
zendesk:
  enabled: false
  subdomain: ""                # e.g. "mycompany" for mycompany.zendesk.com
  email: ""
  # API token stored in environment: ZENDESK_API_TOKEN
  assignee_name: ""            # Name to match for ticket assignment
  auto_create_story: true      # Auto-create DevOps story from Zendesk ticket
  poll_interval_seconds: 300   # 5 minutes

# --- Webhook Server (for push-based triggers) ---
webhook:
  enabled: false
  host: "0.0.0.0"
  port: 8089
  secret: ""                   # Shared secret for webhook validation
                               # Store in environment: WEBHOOK_SECRET

# --- AI Agent ---
ai_agent:
  provider: "anthropic"        # "anthropic", "openai", or "copilot"
  model: "claude-sonnet-4-20250514"  # Model to use for implementation
  review_model: "claude-sonnet-4-20250514"  # Model to use for code review
  require_consent: true        # Prompt user to review data before sending to AI (persisted per-provider after first approval)
  # Approval mode controls how AI changes are applied:
  #   "plan-review" (default) — AI generates a plan, you review & approve each file before it's written
  #   "auto"                  — AI executes directly (Claude CLI / Codex CLI / API writes files)
  approval_mode: "plan-review"
  # Trust levels control how many manual gates are active:
  #   "cautious"    — all gates: consent + plan approval + push confirmation (default)
  #   "balanced"    — skip consent, keep plan + push approval
  #   "autonomous"  — skip consent + plan, keep push confirmation only
  #   "full-auto"   — no gates, fully unattended (for CI/CD or overnight batch runs)
  trust_level: "cautious"
  # Iterative fix loop: when tests fail, feed errors back to AI for auto-fix attempts.
  max_fix_attempts: 3          # Max test→fix→retest cycles (1 = no retry, just fail)
  # Story quality gate: minimum quality score (1-10) before AI implementation proceeds.
  min_story_quality: 4         # Stories scoring below this get feedback posted to ADO instead
  # API keys stored in environment:
  #   anthropic → ANTHROPIC_API_KEY
  #   openai   → OPENAI_API_KEY
  #   copilot  → GITHUB_TOKEN (uses GitHub Models API with OpenAI-compatible endpoint)
  max_tokens: 8192
  temperature: 0.2
  context_files:               # Files to include as context for the AI agent
    - ".current-story.md"
  system_prompt_template: "templates/implement.md"
  review_prompt_template: "templates/review.md"

# --- Local Environment ---
local_env:
  type: "ddev"                 # "ddev", "lando", "docker-compose", "native"
  start_command: "ddev start"
  stop_command: "ddev stop"
  drush_prefix: "ddev drush"
  composer_prefix: "ddev composer"
  test_command: "ddev exec phpunit -c web/core"
  lint_command: "ddev exec phpcs --standard=Drupal --extensions=php,module,install,theme"
  cache_clear: "ddev drush cr"

# --- Git ---
git:
  auto_commit: true
  auto_push: false             # Push to remote after commit
  auto_pr: false               # Auto-create Pull Request after pipeline completes
  pr_target_branch: ""         # PR target branch (empty = use project.base_branch)
  test_scope: "changed"        # "changed" = lint/analyse only changed files, "all" = full module
  commit_message_template: "#{work_item_id} - {title}\n\n{description}"

# --- Notifications ---
notifications:
  enabled: false
  slack_webhook: ""            # Slack incoming webhook URL
  email: ""                    # Email for notifications

# --- Logging ---
logging:
  level: "INFO"                # DEBUG, INFO, WARNING, ERROR
  file: "logs/agent.log"
  max_size_mb: 10
